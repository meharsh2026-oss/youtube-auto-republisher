version: '3.8'

services:
  youtube-republisher:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./downloads:/app/downloads
      - ./temp:/app/temp
      - ./logs:/app/logs
      - ./backend/app.db:/app/app.db
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///app.db
      - DOWNLOAD_FOLDER=./downloads
      - TEMP_FOLDER=./temp
      - LOGS_FOLDER=./logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s